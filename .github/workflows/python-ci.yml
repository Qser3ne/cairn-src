name: Python CI

on:
  pull_request:
    paths:
      - "cairn/**"
      - ".github/workflows/python-ci.yml"
  push:
    branches:
      - main
    paths:
      - "cairn/**"
      - ".github/workflows/python-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        working-directory: cairn
        run: uv run --group dev pytest -s

      - name: Compile Python files
        run: python3 -m compileall -q cairn/src/cairn cairn/tests
